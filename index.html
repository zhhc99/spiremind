*{box-sizing:border-box;margin:0;padding:0;scrollbar-width:none}
*::-webkit-scrollbar{display:none}
body{background:var(--md-sys-color-background);color:var(--md-sys-color-on-surface);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;transition:background .3s,color .3s}
button,input,textarea{font:inherit}
.page-wrapper{width:100%;max-width:var(--page-max-width);margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.top-app-bar{position:sticky;top:0;z-index:100;background:var(--md-sys-color-surface-container);box-shadow:var(--md-sys-elevation-2);padding:0 16px;display:flex;align-items:center;gap:10px;flex-wrap:nowrap;min-height:56px;transition:background .3s}
.app-title{font-size:1.25rem;font-weight:700;color:var(--md-sys-color-primary);letter-spacing:-0.02em;white-space:nowrap;flex-shrink:0}
.char-select-wrap{position:relative;display:flex;align-items:center;flex-shrink:0}
.char-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--md-sys-color-surface-container-high);color:var(--md-sys-color-on-surface-variant);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;overflow:hidden}
.char-btn:hover{background:var(--md-sys-color-surface-variant)}
.char-btn img{width:24px;height:24px;object-fit:contain}
.char-btn .material-icons-round{font-size:20px}
.toolbar-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;flex-wrap:nowrap}
.tonal-btn{display:inline-flex;align-items:center;gap:5px;padding:0 12px 0 10px;height:36px;min-width:36px;border-radius:9999px;border:none;background:var(--md-sys-color-secondary-container);color:var(--md-sys-color-secondary);font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .2s,box-shadow .2s;flex-shrink:0}
.tonal-btn:hover{box-shadow:var(--md-sys-elevation-1)}
.tonal-btn .material-icons-round{font-size:16px}
.tonal-btn span:not(.material-icons-round){display:none}
.icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--md-sys-color-surface-container-high);color:var(--md-sys-color-on-surface-variant);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;position:relative}
.icon-btn:hover{background:var(--md-sys-color-surface-variant)}
.icon-btn.active{background:var(--md-sys-color-primary-container);color:var(--md-sys-color-primary)}
.icon-btn .material-icons-round{font-size:20px}
.toggle-btn{display:inline-flex;align-items:center;justify-content:center;width:42px;height:36px;border-radius:18px;border:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface);color:var(--md-sys-color-on-surface-variant);cursor:pointer;transition:background .2s,color .2s,border-color .2s,box-shadow .2s;flex-shrink:0}
.toggle-btn:hover{background:var(--md-sys-color-surface-container-high);box-shadow:var(--md-sys-elevation-1)}
.toggle-btn.active{background:var(--md-sys-color-primary-container);color:var(--md-sys-color-primary);border-color:color-mix(in srgb,var(--md-sys-color-primary) 30%,transparent)}
.toggle-btn .material-icons-round{font-size:20px}
.dropdown-menu{position:absolute;top:100%;right:0;margin-top:4px;background:var(--md-sys-color-surface-container);border-radius:var(--md-sys-shape-corner-medium);border:1px solid var(--md-sys-color-outline-variant);box-shadow:var(--md-sys-elevation-3);min-width:140px;max-width:min(280px,calc(100vw - 16px));z-index:200;opacity:0;visibility:hidden;--menu-shift-x:0px;transform:translateX(var(--menu-shift-x)) scale(.95);transform-origin:top right;transition:opacity .15s,transform .15s,visibility .15s}
.dropdown-menu.open{opacity:1;visibility:visible;transform:translateX(var(--menu-shift-x)) scale(1)}
.dropdown-menu button{width:100%;padding:10px 14px;border:none;background:transparent;color:var(--md-sys-color-on-surface);font-family:inherit;font-size:.85rem;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.dropdown-menu button:first-child{border-radius:var(--md-sys-shape-corner-medium) var(--md-sys-shape-corner-medium) 0 0}
.dropdown-menu button:last-child{border-radius:0 0 var(--md-sys-shape-corner-medium) var(--md-sys-shape-corner-medium)}
.dropdown-menu button:hover{background:var(--md-sys-color-surface-variant)}
.dropdown-menu button.selected{background:var(--md-sys-color-primary-container);color:var(--md-sys-color-primary)}
.dropdown-menu button img{width:20px;height:20px;object-fit:contain}
.dropdown-menu .material-icons-round{font-size:18px}
.lang-menu{right:auto;left:0;transform-origin:top left}
.main-content{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;padding-bottom:0}
.tier-rows{display:flex;flex-direction:column;gap:12px}
.tier-row{display:flex;align-items:stretch;border-radius:var(--md-sys-shape-corner-medium);background:var(--md-sys-color-surface-container-low);border:1px solid var(--md-sys-color-outline-variant);overflow:hidden;min-height:100px;transition:box-shadow .25s ease,border-color .25s ease,opacity .3s ease,transform .22s cubic-bezier(.4,0,.2,1);position:relative}
.tier-row:hover{box-shadow:var(--md-sys-elevation-1)}
.tier-row.drag-over{box-shadow:var(--md-sys-elevation-3);border-color:var(--md-sys-color-primary)}
.tier-row.dragging{opacity:.4}
.tier-drag-handle{display:flex;align-items:center;justify-content:center;width:28px;flex-shrink:0;cursor:ns-resize;color:var(--md-sys-color-outline);padding:8px 2px;border-right:1px solid var(--md-sys-color-outline-variant);background:transparent;transition:background .2s,color .2s;touch-action:none;user-select:none;-webkit-user-select:none}
.tier-drag-handle:hover{background:var(--md-sys-color-surface-container);color:var(--md-sys-color-on-surface-variant)}
.tier-drag-handle .material-icons-round{font-size:18px}
.tier-label-wrap{display:flex;align-items:center;justify-content:center;width:var(--tier-label-width);flex-shrink:0;background:var(--tier-bg,#888);position:relative}
.tier-label{font-size:1.35rem;font-weight:700;color:#fff;text-align:center;cursor:text;padding:4px 6px;min-width:28px;border-radius:4px;outline:none;text-shadow:0 1px 3px rgba(0,0,0,.4);transition:background .2s}
.tier-label:focus{background:rgba(255,255,255,.2)}
.tier-cards{flex:0 0 var(--tier-cards-width);display:flex;flex-wrap:wrap;align-content:center;gap:var(--tier-card-gap);padding:var(--tier-cards-padding);min-height:76px;transition:background .2s;position:relative}
.tier-row.drag-over .tier-cards{background:color-mix(in srgb,var(--md-sys-color-primary-container) 36%,transparent)}
.tier-actions{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:var(--tier-actions-width);padding:6px 4px;border-left:1px solid var(--md-sys-color-outline-variant);flex-shrink:0}
.tier-actions .del-btn{width:32px;height:32px}
.tier-actions .del-btn .material-icons-round{font-size:18px}
.del-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--md-sys-color-on-surface-variant);position:relative;overflow:hidden;transition:background .2s}
.del-btn:hover{background:var(--md-sys-color-surface-variant)}
.del-btn .material-icons-round{font-size:20px}

<div class="page-wrapper">

    <span class="app-title" id="appTitle"></span>
    <div class="char-select-wrap">

      <button class="tonal-btn" id="exportMarkdownBtn" title=""><span class="material-icons-round">article</span><span id="exportMarkdownText"></span></button>
      <button class="tonal-btn" id="exportImageBtn" title=""><span class="material-icons-round">image</span><span id="exportImageText"></span></button>
      <button class="toggle-btn" id="noteMarkersBtn" title=""><span class="material-icons-round">task_alt</span></button>
      <div class="char-select-wrap">
        <button class="icon-btn" id="apiLanguageBtn" title=""><span class="material-icons-round">language</span></button>

      </div>
      <button class="icon-btn" id="themeBtn" title=""><span class="material-icons-round">dark_mode</span></button>
    </div>
  </header>
  <main class="main-content" id="tierList">
    <div class="tier-rows" id="tierRows"></div>
    <button class="add-tier-btn" id="addTierBtn"><span class="material-icons-round">add</span><span id="addTierText"></span></button>
    <div style="height:8px"></div>
  </main>
  <section class="unclassified-panel collapsed" id="dockPanel">

      <div class="panel-header-text">
        <span class="material-icons-round" style="color:var(--md-sys-color-on-surface-variant);font-size:18px">style</span>
        <span class="panel-title" id="dockTitle"></span>
        <span class="panel-count" id="dockCount">0</span>
      </div>
      <div class="search-field">
        <span class="material-icons-round">search</span>
        <input type="text" id="searchInput">
      </div>
      <button class="panel-chevron" type="button" data-toggle-dock="true"><span class="material-icons-round">expand_less</span></button>
    </div>
    <div class="panel-cards" id="dockCards"></div>
  </section>
</div>
<div class="bigcard-tooltip" id="hoverPreview"></div>
<div class="popup-overlay" id="popupOverlay"></div>
<div class="popup-card" id="popupCard"></div>
<div class="snackbar" id="snackbar"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script type="module" src="./dist/main.js"></script>
